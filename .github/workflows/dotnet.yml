name: .NET

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NestLaserDesktop.sln

      - name: Build
        run: dotnet build NestLaserDesktop.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test NestLaserDesktop.sln --configuration Release --no-build --verbosity normal
